<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>SentryChain AI system architecture</title>
  <desc>Two-phase pipeline: Phase 1 ingestion from SLA PDFs to Pinecone and Neo4j, Phase 2 monitoring from Tavily news through guardrails, RAG retrieval, LLM, and verdict output.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .label { font-size: 12px; font-weight: 500; fill: #888; }
    </style>
  </defs>

  <!-- ── Phase 1 container ── -->
  <rect x="30" y="28" width="620" height="220" rx="16" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.8"/>
  <text class="label" x="50" y="52">PHASE 1 — INGESTION</text>

  <!-- SLA PDFs -->
  <rect x="50" y="68" width="112" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text class="th" x="106" y="91" text-anchor="middle" dominant-baseline="central">SLA PDFs</text>
  <text class="ts" x="106" y="109" text-anchor="middle" dominant-baseline="central">contracts</text>

  <line x1="162" y1="94" x2="196" y2="94" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LlamaParse -->
  <rect x="196" y="68" width="112" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="th" x="252" y="91" text-anchor="middle" dominant-baseline="central">LlamaParse</text>
  <text class="ts" x="252" y="109" text-anchor="middle" dominant-baseline="central">agentic tier</text>

  <line x1="308" y1="94" x2="342" y2="94" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Text + Metadata -->
  <rect x="342" y="68" width="128" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text class="th" x="406" y="91" text-anchor="middle" dominant-baseline="central">Text + Metadata</text>
  <text class="ts" x="406" y="109" text-anchor="middle" dominant-baseline="central">parsed + structured</text>

  <line x1="470" y1="94" x2="504" y2="94" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Chunking -->
  <rect x="504" y="68" width="112" height="52" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text class="th" x="560" y="91" text-anchor="middle" dominant-baseline="central">Chunking</text>
  <text class="ts" x="560" y="109" text-anchor="middle" dominant-baseline="central">BAAI/bge-m3</text>

  <!-- Branch to Pinecone and Neo4j -->
  <path d="M560 120 L560 170 L340 170 L340 195" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M560 120 L560 170 L520 170 L520 195" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Pinecone -->
  <rect x="270" y="195" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="th" x="340" y="212" text-anchor="middle" dominant-baseline="central">Pinecone</text>
  <text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">vector store</text>

  <!-- Neo4j -->
  <rect x="450" y="195" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text class="th" x="520" y="212" text-anchor="middle" dominant-baseline="central">Neo4j</text>
  <text class="ts" x="520" y="230" text-anchor="middle" dominant-baseline="central">knowledge graph</text>

  <!-- Connector between phases -->
  <path d="M430 239 Q430 270 340 270" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Phase 2 container ── -->
  <rect x="30" y="278" width="620" height="308" rx="16" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.8" fill-opacity="0.4"/>
  <text class="label" x="50" y="302">PHASE 2 — MONITORING &amp; VERDICT</text>

  <!-- Tavily -->
  <rect x="50" y="314" width="112" height="52" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
  <text class="th" x="106" y="336" text-anchor="middle" dominant-baseline="central">Tavily Search</text>
  <text class="ts" x="106" y="354" text-anchor="middle" dominant-baseline="central">live news</text>

  <line x1="162" y1="340" x2="196" y2="340" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Input Guardrail -->
  <rect x="196" y="314" width="128" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text class="th" x="260" y="334" text-anchor="middle" dominant-baseline="central">Input guardrail</text>
  <text class="ts" x="260" y="352" text-anchor="middle" dominant-baseline="central">keyword filter</text>

  <line x1="324" y1="340" x2="358" y2="340" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Hybrid RAG -->
  <rect x="358" y="314" width="132" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text class="th" x="424" y="334" text-anchor="middle" dominant-baseline="central">Hybrid RAG</text>
  <text class="ts" x="424" y="352" text-anchor="middle" dominant-baseline="central">vector + graph</text>

  <line x1="490" y1="340" x2="524" y2="340" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Groq LLM -->
  <rect x="524" y="314" width="112" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text class="th" x="580" y="336" text-anchor="middle" dominant-baseline="central">Groq LLM</text>
  <text class="ts" x="580" y="354" text-anchor="middle" dominant-baseline="central">LLaMA 3.3 70B</text>

  <line x1="580" y1="366" x2="580" y2="404" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Output Guardrail -->
  <rect x="514" y="404" width="132" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text class="th" x="580" y="424" text-anchor="middle" dominant-baseline="central">Output guardrail</text>
  <text class="ts" x="580" y="442" text-anchor="middle" dominant-baseline="central">hallucination check</text>

  <!-- Arrow to verdict -->
  <path d="M514 430 L340 430 L340 490" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Verdict -->
  <rect x="220" y="490" width="240" height="56" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.8"/>
  <text class="th" x="340" y="512" text-anchor="middle" dominant-baseline="central">Violation verdict</text>
  <text class="ts" x="340" y="532" text-anchor="middle" dominant-baseline="central">clause + penalty + evidence</text>

  <!-- Dashed retrieval lines -->
  <path d="M424 366 L424 398 L520 398 L520 217" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <path d="M340 217 L340 280 L260 280 L260 314" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Legend -->
  <line x1="50" y1="568" x2="78" y2="568" stroke="#aaa" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text class="ts" x="84" y="572">data retrieval from stores</text>
</svg>